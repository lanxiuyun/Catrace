<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catrace - 定时提醒插件</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .toast-enter { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn {
            from { transform: translateY(-20px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden select-none">

    <!-- 1. 顶部全局主栏 (Top Main Header) -->
    <header class="h-14 bg-white border-b border-slate-200 px-4 md:px-6 flex items-center justify-between shrink-0 z-20 shadow-2xs">
        
        <!-- 左侧：Logo 与系统一级导航菜单 -->
        <div class="flex items-center gap-8">
            <!-- App Logo -->
            <div class="flex items-center gap-2.5 cursor-pointer">
                <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-brand-700 to-brand-500 text-white flex items-center justify-center font-extrabold text-lg shadow-sm shadow-brand-200">
                    C
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="font-bold text-slate-800 text-base tracking-tight">Catrace</span>
                    <span class="text-[10px] bg-brand-50 text-brand-600 px-1.5 py-0.5 rounded-full font-mono font-semibold">v2.4</span>
                </div>
            </div>

            <!-- 全局一级导航 (Primary Tabs) -->
            <nav class="hidden md:flex items-center gap-1">
                <a href="#" class="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-500 hover:text-slate-800 hover:bg-slate-100 transition">
                    概览
                </a>
                <a href="#" class="px-3 py-1.5 rounded-lg text-xs font-semibold text-brand-700 bg-brand-50 transition flex items-center gap-1.5">
                    <i data-lucide="puzzle" class="w-3.5 h-3.5 text-brand-600"></i>
                    <span>功能插件</span>
                </a>
                <a href="#" class="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-500 hover:text-slate-800 hover:bg-slate-100 transition">
                    运行日志
                </a>
                <a href="#" class="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-500 hover:text-slate-800 hover:bg-slate-100 transition">
                    系统设置
                </a>
            </nav>
        </div>

        <!-- 右侧：全局搜索、通知与用户中心 -->
        <div class="flex items-center gap-3">
            <!-- 快捷搜索框 -->
            <div class="hidden sm:flex items-center gap-2 bg-slate-100 border border-slate-200/80 rounded-lg px-2.5 py-1 text-slate-400 text-xs w-48 hover:border-slate-300 cursor-pointer transition">
                <i data-lucide="search" class="w-3.5 h-3.5"></i>
                <span class="flex-1 text-slate-400">搜索功能与规则...</span>
                <kbd class="text-[10px] font-mono bg-white text-slate-500 px-1.5 py-0.5 rounded border border-slate-200">⌘K</kbd>
            </div>

            <div class="h-4 w-px bg-slate-200 hidden sm:block"></div>

            <!-- 通知中心图标 -->
            <button class="p-1.5 text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-lg transition relative" title="消息通知">
                <i data-lucide="bell" class="w-4 h-4"></i>
                <span class="w-2 h-2 bg-brand-600 rounded-full absolute top-1 right-1 ring-2 ring-white"></span>
            </button>

            <!-- 帮助 / 文档 -->
            <button class="p-1.5 text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-lg transition" title="使用帮助">
                <i data-lucide="help-circle" class="w-4 h-4"></i>
            </button>

            <!-- 用户头像 -->
            <div class="flex items-center gap-2 pl-1 border-l border-slate-100">
                <div class="w-7 h-7 rounded-full bg-slate-200 border border-slate-300/80 flex items-center justify-center text-xs font-bold text-slate-600">
                    A
                </div>
            </div>
        </div>
    </header>

    <!-- 主体区域：左侧插件导航 + 右侧主工作区 -->
    <div class="flex-1 flex overflow-hidden">

        <!-- 2. 左侧插件主栏 (Left Plugin Navigation Sidebar) -->
        <aside class="w-60 bg-white border-r border-slate-200 flex flex-col shrink-0">
            <!-- 插件栏标题与操作 -->
            <div class="p-3.5 border-b border-slate-100 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-slate-700 tracking-wide uppercase">插件中心</span>
                    <span class="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-full font-mono">4</span>
                </div>
                <button class="p-1 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded transition" title="刷新插件列表">
                    <i data-lucide="rotate-cw" class="w-3.5 h-3.5"></i>
                </button>
            </div>

            <!-- 插件搜索/筛选过滤 -->
            <div class="p-2 border-b border-slate-100">
                <div class="relative">
                    <i data-lucide="search" class="w-3.5 h-3.5 absolute left-2.5 top-2.5 text-slate-400"></i>
                    <input type="text" placeholder="查找已安装插件..." class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-8 pr-3 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-brand-500">
                </div>
            </div>

            <!-- 插件列表容器 -->
            <div class="p-2 space-y-1 overflow-y-auto flex-1">
                
                <!-- 插件 1: 定时提醒 (当前选中状态) -->
                <a href="#" class="flex items-center gap-3 p-2.5 rounded-xl bg-brand-50/80 border border-brand-200/80 transition text-slate-800 group shadow-2xs">
                    <div class="w-9 h-9 rounded-lg bg-brand-600 text-white flex items-center justify-center shrink-0 shadow-xs">
                        <i data-lucide="clock" class="w-4 h-4"></i>
                    </div>
                    <div class="overflow-hidden flex-1 min-w-0">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-bold text-brand-900 truncate">定时提醒</span>
                            <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                        </div>
                        <div class="text-[11px] text-brand-600 truncate mt-0.5">自定义时间间隔提醒</div>
                    </div>
                </a>

                <!-- 插件 2: 久坐提醒 -->
                <a href="#" class="flex items-center gap-3 p-2.5 rounded-xl hover:bg-slate-100/80 transition text-slate-700 group">
                    <div class="w-9 h-9 rounded-lg bg-amber-100 text-amber-600 group-hover:bg-amber-200 transition flex items-center justify-center shrink-0">
                        <i data-lucide="armchair" class="w-4 h-4"></i>
                    </div>
                    <div class="overflow-hidden flex-1 min-w-0">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-medium text-slate-800 truncate">久坐护脊</span>
                            <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                        </div>
                        <div class="text-[11px] text-slate-400 truncate mt-0.5">智能人体工程学检测</div>
                    </div>
                </a>

                <!-- 插件 3: Agent 通知 -->
                <a href="#" class="flex items-center gap-3 p-2.5 rounded-xl hover:bg-slate-100/80 transition text-slate-700 group">
                    <div class="w-9 h-9 rounded-lg bg-blue-100 text-blue-600 group-hover:bg-blue-200 transition flex items-center justify-center shrink-0">
                        <i data-lucide="bot" class="w-4 h-4"></i>
                    </div>
                    <div class="overflow-hidden flex-1 min-w-0">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-medium text-slate-800 truncate">AI Agent 联动</span>
                            <span class="w-2 h-2 rounded-full bg-slate-300"></span>
                        </div>
                        <div class="text-[11px] text-slate-400 truncate mt-0.5">支持 Webhook 事件...</div>
                    </div>
                </a>

                <!-- 插件 4: Demo Timer -->
                <a href="#" class="flex items-center gap-3 p-2.5 rounded-xl hover:bg-slate-100/80 transition text-slate-700 group">
                    <div class="w-9 h-9 rounded-lg bg-emerald-100 text-emerald-600 group-hover:bg-emerald-200 transition flex items-center justify-center shrink-0">
                        <i data-lucide="timer" class="w-4 h-4"></i>
                    </div>
                    <div class="overflow-hidden flex-1 min-w-0">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-medium text-slate-800 truncate">Demo Timer</span>
                            <span class="text-[10px] bg-slate-100 text-slate-400 px-1 rounded">v0.1</span>
                        </div>
                        <div class="text-[11px] text-slate-400 truncate mt-0.5">示例外部倒计时模块</div>
                    </div>
                </a>

                <div class="pt-2 px-2">
                    <button class="w-full py-2 border border-dashed border-slate-300 rounded-xl text-xs text-slate-500 hover:text-brand-600 hover:border-brand-300 hover:bg-brand-50/30 transition flex items-center justify-center gap-1.5 font-medium">
                        <i data-lucide="plus-circle" class="w-3.5 h-3.5"></i>
                        <span>探索更多插件</span>
                    </button>
                </div>
            </div>

            <!-- 底部社群/支持信息 -->
            <div class="p-3 border-t border-slate-100 bg-slate-50/50">
                <div class="flex items-center justify-between text-[11px] text-slate-400">
                    <span class="flex items-center gap-1">
                        <i data-lucide="message-square" class="w-3.5 h-3.5"></i>
                        <span>交流群</span>
                    </span>
                    <span class="font-mono text-slate-500 font-medium">468998176</span>
                </div>
            </div>
        </aside>

        <!-- 3. 主内容区域 (Main Configuration Canvas) -->
        <main class="flex-1 flex flex-col min-w-0 bg-slate-50/60 overflow-y-auto relative">
            
            <!-- 插件工作区顶部 Bar -->
            <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10 shadow-2xs">
                <div class="flex items-center gap-3.5">
                    <div class="w-10 h-10 rounded-xl bg-brand-100 text-brand-600 flex items-center justify-center">
                        <i data-lucide="alarm-clock" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <div class="flex items-center gap-3">
                            <h1 class="text-lg font-bold text-slate-800">定时提醒管理</h1>
                            <span id="activeCountBadge" class="px-2 py-0.5 bg-emerald-100 text-emerald-700 text-xs font-semibold rounded-full flex items-center gap-1">
                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                                已启用 2 条规则
                            </span>
                        </div>
                        <p class="text-xs text-slate-500 mt-0.5">配置周期性固定时间间隔或每天固定时刻的高效习惯提醒</p>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <!-- 插件总开关 -->
                    <div class="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">
                        <span class="text-xs font-medium text-slate-600">插件开关</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" checked class="sr-only peer" id="masterToggle">
                            <div class="w-8 h-4 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-brand-600"></div>
                        </label>
                    </div>

                    <button onclick="openModal()" class="flex items-center gap-1.5 bg-brand-600 hover:bg-brand-700 text-white px-3.5 py-2 rounded-lg text-xs font-medium shadow-xs transition active:scale-95">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        <span>添加规则</span>
                    </button>
                </div>
            </header>

            <div class="p-6 max-w-5xl mx-auto w-full space-y-5">
                
                <!-- 快捷预设模版栏 -->
                <div class="bg-gradient-to-r from-brand-500/10 via-purple-500/5 to-transparent p-4 rounded-xl border border-brand-100 flex flex-col md:flex-row items-start md:items-center justify-between gap-3">
                    <div class="flex items-center gap-2.5">
                        <div class="p-2 bg-white rounded-lg shadow-2xs text-brand-600">
                            <i data-lucide="sparkles" class="w-4 h-4"></i>
                        </div>
                        <div>
                            <h3 class="text-xs font-bold text-slate-800">一键快捷应用</h3>
                            <p class="text-[11px] text-slate-500">点击下方常用健康与工作提醒规则，快速创建</p>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="addPreset('drink')" class="inline-flex items-center gap-1 px-2.5 py-1.5 bg-white hover:bg-slate-50 text-slate-700 text-xs font-medium rounded-lg border border-slate-200 shadow-2xs transition">
                            <span>🚰 喝水</span>
                            <span class="text-slate-400 text-[11px]">(20分/次)</span>
                        </button>
                        <button onclick="addPreset('eye')" class="inline-flex items-center gap-1 px-2.5 py-1.5 bg-white hover:bg-slate-50 text-slate-700 text-xs font-medium rounded-lg border border-slate-200 shadow-2xs transition">
                            <span>👁️ 护眼</span>
                            <span class="text-slate-400 text-[11px]">(45分/次)</span>
                        </button>
                        <button onclick="addPreset('stand')" class="inline-flex items-center gap-1 px-2.5 py-1.5 bg-white hover:bg-slate-50 text-slate-700 text-xs font-medium rounded-lg border border-slate-200 shadow-2xs transition">
                            <span>🚶 站立</span>
                            <span class="text-slate-400 text-[11px]">(60分/次)</span>
                        </button>
                        <button onclick="addPreset('offwork')" class="inline-flex items-center gap-1 px-2.5 py-1.5 bg-white hover:bg-slate-50 text-slate-700 text-xs font-medium rounded-lg border border-slate-200 shadow-2xs transition">
                            <span>📝 下班日志</span>
                            <span class="text-slate-400 text-[11px]">(18:00)</span>
                        </button>
                    </div>
                </div>

                <!-- 规则列表 -->
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider">已配置规则 (<span id="ruleCount">2</span>)</h2>
                        <span class="text-[11px] text-slate-400">离开电脑时会自动暂存计时器</span>
                    </div>

                    <!-- 动态规则卡片渲染区 -->
                    <div id="rulesContainer" class="space-y-3">
                        <!-- Rules dynamically inserted via JavaScript -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 4. 添加/编辑规则 Modal 弹窗 -->
    <div id="ruleModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl border border-slate-100 overflow-hidden transform scale-95 transition-transform duration-200" id="modalCard">
            
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <div class="flex items-center gap-2">
                    <div class="w-7 h-7 rounded-lg bg-brand-100 text-brand-600 flex items-center justify-center font-bold text-xs" id="modalIcon">
                        ⏰
                    </div>
                    <h3 class="font-bold text-slate-800 text-sm" id="modalTitle">添加提醒规则</h3>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100 transition">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>

            <form id="ruleForm" onsubmit="saveRule(event)" class="p-6 space-y-4">
                <input type="hidden" id="ruleId">

                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1.5">规则名称</label>
                    <input type="text" id="ruleName" required placeholder="例如：喝水提醒、久坐活动" class="w-full px-3.5 py-2 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1.5">提醒触发类型</label>
                    <div class="grid grid-cols-2 gap-2 p-1 bg-slate-100 rounded-lg text-xs font-medium">
                        <button type="button" id="typeIntervalBtn" onclick="setTriggerType('interval')" class="py-1.5 rounded-md bg-white text-slate-800 shadow-2xs font-semibold text-center transition">固定时间间隔</button>
                        <button type="button" id="typeFixedBtn" onclick="setTriggerType('fixed')" class="py-1.5 rounded-md text-slate-500 hover:text-slate-800 text-center transition">每天指定时刻</button>
                    </div>
                </div>

                <div id="intervalConfig" class="space-y-3 bg-slate-50 p-3.5 rounded-xl border border-slate-100">
                    <div class="flex items-center justify-between">
                        <label class="text-xs font-semibold text-slate-700">时间间隔</label>
                        <span class="text-xs font-bold text-brand-600"><span id="intervalValDisplay">20</span> 分钟</span>
                    </div>
                    <input type="range" id="ruleInterval" min="1" max="180" value="20" oninput="document.getElementById('intervalValDisplay').innerText = this.value" class="w-full accent-brand-600 cursor-pointer">
                    <div class="flex justify-between text-[10px] text-slate-400 font-mono">
                        <span>1分钟</span>
                        <span>60分钟</span>
                        <span>180分钟</span>
                    </div>
                </div>

                <div id="fixedConfig" class="hidden space-y-3 bg-slate-50 p-3.5 rounded-xl border border-slate-100">
                    <div>
                        <label class="block text-xs font-semibold text-slate-700 mb-1">触发时刻</label>
                        <input type="time" id="ruleTime" value="18:00" class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-brand-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-1">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">生效时间段</label>
                        <select id="ruleActiveHours" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs bg-white text-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500">
                            <option value="all">全天 24 小时</option>
                            <option value="work" selected>工作时间内 (09:00 - 18:00)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">活跃检测</label>
                        <select id="ruleActiveMode" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs bg-white text-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500">
                            <option value="activeOnly">仅电脑活跃时计时</option>
                            <option value="always">强行提醒 (忽略空闲)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1.5">自定义提醒文案</label>
                    <textarea id="ruleMessage" rows="2" placeholder="留空则使用默认通知文案..." class="w-full px-3.5 py-2 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition resize-none"></textarea>
                </div>

                <div class="pt-3 border-t border-slate-100 flex items-center justify-between">
                    <button type="button" onclick="testCurrentModalRule()" class="px-3 py-1.5 text-xs font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition flex items-center gap-1">
                        <i data-lucide="bell-ring" class="w-3.5 h-3.5"></i>
                        <span>预览此弹窗</span>
                    </button>
                    <div class="flex items-center gap-2">
                        <button type="button" onclick="closeModal()" class="px-3.5 py-1.5 text-xs font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition">取消</button>
                        <button type="submit" class="px-4 py-1.5 text-xs font-medium bg-brand-600 hover:bg-brand-700 text-white rounded-lg transition shadow-xs">保存规则</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- 模拟系统通知容器 -->
    <div id="toastContainer" class="fixed top-16 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        // 示例数据状态
        let rules = [
            {
                id: '1',
                name: '定时喝水提醒',
                type: 'interval',
                interval: 20,
                time: '18:00',
                activeHours: 'work',
                activeMode: 'activeOnly',
                message: '喝杯温水，保持身体水分充足！',
                enabled: true
            },
            {
                id: '2',
                name: '久坐伸展提醒',
                type: 'interval',
                interval: 45,
                time: '18:00',
                activeHours: 'work',
                activeMode: 'activeOnly',
                message: '站起来活动活动肩膀，做个拉伸吧。',
                enabled: true
            },
            {
                id: '3',
                name: '下班总结填报',
                type: 'fixed',
                interval: 30,
                time: '18:00',
                activeHours: 'all',
                activeMode: 'always',
                message: '记得整理今天的进度并提交工作日志哦！',
                enabled: false
            }
        ];

        let currentTriggerType = 'interval';

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            renderRules();
        });

        function renderRules() {
            const container = document.getElementById('rulesContainer');
            const activeCount = rules.filter(r => r.enabled).length;
            
            document.getElementById('ruleCount').innerText = rules.length;
            document.getElementById('activeCountBadge').innerHTML = `
                <span class="w-1.5 h-1.5 rounded-full ${activeCount > 0 ? 'bg-emerald-500 animate-pulse' : 'bg-slate-400'}"></span>
                已启用 ${activeCount} 条规则
            `;

            if (rules.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-2xl p-10 text-center border border-dashed border-slate-200">
                        <div class="w-10 h-10 bg-slate-100 text-slate-400 rounded-full flex items-center justify-center mx-auto mb-2">
                            <i data-lucide="bell-off" class="w-5 h-5"></i>
                        </div>
                        <h3 class="text-xs font-bold text-slate-700">暂无提醒规则</h3>
                        <p class="text-[11px] text-slate-400 mt-0.5">点击右上角“添加规则”或使用推荐预设模板</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = rules.map(rule => {
                const isInterval = rule.type === 'interval';
                const timeTag = isInterval 
                    ? `每 ${rule.interval} 分钟` 
                    : `每天 ${rule.time}`;
                
                const icon = rule.name.includes('水') ? '🚰' 
                           : rule.name.includes('站') || rule.name.includes('坐') || rule.name.includes('展') ? '🚶' 
                           : rule.name.includes('眼') ? '👁️' 
                           : '⏰';

                return `
                    <div class="bg-white rounded-xl border ${rule.enabled ? 'border-slate-200/90 shadow-2xs' : 'border-slate-200/50 opacity-60'} hover:border-brand-200 transition p-3.5 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 group">
                        
                        <div class="flex items-center gap-3 min-w-0">
                            <div class="w-9 h-9 rounded-xl bg-slate-100 group-hover:bg-brand-50 text-slate-700 group-hover:text-brand-600 flex items-center justify-center text-base shrink-0 transition">
                                ${icon}
                            </div>
                            <div class="space-y-0.5 overflow-hidden">
                                <div class="flex items-center gap-2 flex-wrap">
                                    <h3 class="font-bold text-slate-800 text-xs truncate">${rule.name}</h3>
                                    <span class="px-2 py-0.5 text-[10px] font-semibold ${isInterval ? 'bg-purple-50 text-purple-700 border border-purple-100' : 'bg-amber-50 text-amber-700 border border-amber-100'} rounded-md">
                                        ${timeTag}
                                    </span>
                                    <span class="text-[10px] text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded">
                                        ${rule.activeHours === 'work' ? '工作时间' : '全天'}
                                    </span>
                                </div>
                                <p class="text-[11px] text-slate-500 truncate max-w-lg">${rule.message || '（默认消息）'}</p>
                            </div>
                        </div>

                        <div class="flex items-center justify-end w-full sm:w-auto gap-2.5 border-t sm:border-t-0 pt-2.5 sm:pt-0 border-slate-100 shrink-0">
                            <label class="relative inline-flex items-center cursor-pointer mr-1">
                                <input type="checkbox" ${rule.enabled ? 'checked' : ''} onchange="toggleRule('${rule.id}')" class="sr-only peer">
                                <div class="w-8 h-4 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-brand-600"></div>
                            </label>

                            <div class="h-3.5 w-px bg-slate-200"></div>

                            <button onclick="triggerToast('${rule.name}', '${rule.message}')" class="px-2 py-1 text-xs font-medium text-brand-600 hover:bg-brand-50 rounded-md transition flex items-center gap-1">
                                <i data-lucide="play" class="w-3 h-3"></i>
                                <span>测试</span>
                            </button>

                            <button onclick="editRule('${rule.id}')" class="p-1 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-md transition" title="编辑">
                                <i data-lucide="file-pen-line" class="w-3.5 h-3.5"></i>
                            </button>

                            <button onclick="deleteRule('${rule.id}')" class="p-1 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-md transition" title="删除">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            lucide.createIcons();
        }

        function toggleRule(id) {
            const rule = rules.find(r => r.id === id);
            if (rule) {
                rule.enabled = !rule.enabled;
                renderRules();
            }
        }

        function deleteRule(id) {
            rules = rules.filter(r => r.id !== id);
            renderRules();
        }

        function addPreset(type) {
            const presets = {
                drink: { name: '喝水提醒', type: 'interval', interval: 20, time: '18:00', activeHours: 'work', activeMode: 'activeOnly', message: '喝水时间到啦！补充 200ml 温水。', enabled: true },
                eye: { name: '远眺护眼', type: 'interval', interval: 45, time: '18:00', activeHours: 'work', activeMode: 'activeOnly', message: '眼睛该休息了！转头向窗外远眺 20 秒吧。', enabled: true },
                stand: { name: '站立活动', type: 'interval', interval: 60, time: '18:00', activeHours: 'work', activeMode: 'activeOnly', message: '连续坐太久了，站起来拉伸一下身体！', enabled: true },
                offwork: { name: '下班总结', type: 'fixed', interval: 30, time: '18:00', activeHours: 'all', activeMode: 'always', message: '下班时间快到了，记得提交工作日志。', enabled: true }
            };

            if (presets[type]) {
                const newRule = { ...presets[type], id: Date.now().toString() };
                rules.unshift(newRule);
                renderRules();
                triggerToast('快捷预设已添加', `成功创建 "${newRule.name}" 提醒。`);
            }
        }

        function openModal(isEdit = false) {
            const modal = document.getElementById('ruleModal');
            const modalCard = document.getElementById('modalCard');
            if(!isEdit) {
                document.getElementById('ruleForm').reset();
                document.getElementById('ruleId').value = '';
                document.getElementById('modalTitle').innerText = '添加提醒规则';
                setTriggerType('interval');
            }
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modalCard.classList.remove('scale-95');
            modalCard.classList.add('scale-100');
        }

        function closeModal() {
            const modal = document.getElementById('ruleModal');
            const modalCard = document.getElementById('modalCard');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modalCard.classList.remove('scale-100');
            modalCard.classList.add('scale-95');
        }

        function setTriggerType(type) {
            currentTriggerType = type;
            const intervalBtn = document.getElementById('typeIntervalBtn');
            const fixedBtn = document.getElementById('typeFixedBtn');
            const intervalConfig = document.getElementById('intervalConfig');
            const fixedConfig = document.getElementById('fixedConfig');

            if (type === 'interval') {
                intervalBtn.className = 'py-1.5 rounded-md bg-white text-slate-800 shadow-2xs font-semibold text-center transition';
                fixedBtn.className = 'py-1.5 rounded-md text-slate-500 hover:text-slate-800 text-center transition';
                intervalConfig.classList.remove('hidden');
                fixedConfig.classList.add('hidden');
            } else {
                fixedBtn.className = 'py-1.5 rounded-md bg-white text-slate-800 shadow-2xs font-semibold text-center transition';
                intervalBtn.className = 'py-1.5 rounded-md text-slate-500 hover:text-slate-800 text-center transition';
                fixedConfig.classList.remove('hidden');
                intervalConfig.classList.add('hidden');
            }
        }

        function editRule(id) {
            const rule = rules.find(r => r.id === id);
            if (!rule) return;

            document.getElementById('ruleId').value = rule.id;
            document.getElementById('ruleName').value = rule.name;
            document.getElementById('ruleInterval').value = rule.interval || 20;
            document.getElementById('intervalValDisplay').innerText = rule.interval || 20;
            document.getElementById('ruleTime').value = rule.time || '18:00';
            document.getElementById('ruleActiveHours').value = rule.activeHours;
            document.getElementById('ruleActiveMode').value = rule.activeMode;
            document.getElementById('ruleMessage').value = rule.message;
            document.getElementById('modalTitle').innerText = '编辑提醒规则';

            setTriggerType(rule.type);
            openModal(true);
        }

        function saveRule(e) {
            e.preventDefault();
            const id = document.getElementById('ruleId').value;
            const name = document.getElementById('ruleName').value;
            const interval = parseInt(document.getElementById('ruleInterval').value);
            const time = document.getElementById('ruleTime').value;
            const activeHours = document.getElementById('ruleActiveHours').value;
            const activeMode = document.getElementById('ruleActiveMode').value;
            const message = document.getElementById('ruleMessage').value;

            if (id) {
                const idx = rules.findIndex(r => r.id === id);
                if (idx !== -1) {
                    rules[idx] = { ...rules[idx], name, type: currentTriggerType, interval, time, activeHours, activeMode, message };
                }
            } else {
                rules.unshift({
                    id: Date.now().toString(),
                    name,
                    type: currentTriggerType,
                    interval,
                    time,
                    activeHours,
                    activeMode,
                    message,
                    enabled: true
                });
            }

            renderRules();
            closeModal();
            triggerToast('已保存规则', `规则 "${name}" 已成功更新。`);
        }

        function testCurrentModalRule() {
            const name = document.getElementById('ruleName').value || '未命名提醒';
            const msg = document.getElementById('ruleMessage').value || '这是一条模拟提醒通知内容。';
            triggerToast(name, msg);
        }

        function triggerToast(title, body) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'pointer-events-auto bg-white/95 backdrop-blur-md border border-slate-200 shadow-xl rounded-xl p-3.5 w-72 toast-enter flex items-start gap-2.5 text-slate-800';
            toast.innerHTML = `
                <div class="w-7 h-7 rounded-lg bg-brand-600 text-white flex items-center justify-center shrink-0 shadow-xs mt-0.5">
                    <i data-lucide="bell" class="w-3.5 h-3.5"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between">
                        <h4 class="font-bold text-xs text-slate-800 truncate">${title || '定时提醒'}</h4>
                        <span class="text-[10px] text-slate-400">刚刚</span>
                    </div>
                    <p class="text-xs text-slate-600 mt-0.5 leading-relaxed">${body || '提示内容为空'}</p>
                </div>
                <button onclick="this.parentElement.remove()" class="text-slate-400 hover:text-slate-600">
                    <i data-lucide="x" class="w-3.5 h-3.5"></i>
                </button>
            `;
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                if (toast.parentElement) {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s';
                    setTimeout(() => toast.remove(), 300);
                }
            }, 4000);
        }
    </script>
</body>
</html>
